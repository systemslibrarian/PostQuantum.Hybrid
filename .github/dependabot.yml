version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      bouncycastle:
        patterns: ["BouncyCastle*"]
      test-dependencies:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
