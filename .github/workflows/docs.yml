name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/**'
      - 'docs-site/**'
      - 'samples/README.md'
      - 'KNOWN-GAPS.md'
      - 'HARDENING-CHECKLIST.md'
      - 'CHANGELOG.md'
      - 'SECURITY.md'
      - 'CONTRIBUTING.md'
      - 'README.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Restore + build (so DocFX can resolve XML docs)
        run: |
          dotnet restore PostQuantum.Hybrid.slnx
          dotnet build PostQuantum.Hybrid.slnx --configuration Release --no-restore

      - name: Build docs site
        working-directory: docs-site
        run: docfx docfx.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
