# Build the WebApiDemo image with ACR and deploy it to Azure Container Apps
# on every push to main that touches the demo or the library source.
#
# Required repository secrets:
#   AZURE_CREDENTIALS  - JSON from: az ad sp create-for-rbac --sdk-auth \
#                          --role contributor \
#                          --scopes /subscriptions/<SUB>/resourceGroups/pqhybrid-demos
#   ACR_NAME           - e.g. pqhybriddemoacr
#
# Assumes the resource group (pqhybrid-demos), ACR, and container app
# (pqhybrid-webapidemo) already exist - create them once via
# samples/WebApiDemo/DEPLOY.md or by running samples/WebApiDemo/deploy.sh.
#
# To God be the glory - 1 Corinthians 10:31.

name: Deploy WebApiDemo

on:
  push:
    branches: [main]
    paths:
      - "samples/WebApiDemo/**"
      - "src/PostQuantum.Hybrid/**"
      - "src/PostQuantum.Hybrid.AspNetCore/**"
      - "src/PostQuantum.Hybrid.Analyzers/**"
      - "Directory.Build.props"
      - "Directory.Build.targets"
      - "global.json"
      - ".github/workflows/deploy-webapidemo.yml"
  workflow_dispatch:

env:
  RESOURCE_GROUP: pqhybrid-demos
  APP_NAME: pqhybrid-webapidemo
  IMAGE_NAME: pqhybrid-webapidemo

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build image in ACR (repo root as context)
        run: |
          TAG="${GITHUB_SHA::8}"
          az acr build \
            --registry "${{ secrets.ACR_NAME }}" \
            --image "${IMAGE_NAME}:${TAG}" \
            --image "${IMAGE_NAME}:latest" \
            --file samples/WebApiDemo/Dockerfile \
            .

      - name: Update Container App to new image
        run: |
          TAG="${GITHUB_SHA::8}"
          az containerapp update \
            --name "${APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --image "${{ secrets.ACR_NAME }}.azurecr.io/${IMAGE_NAME}:${TAG}"
