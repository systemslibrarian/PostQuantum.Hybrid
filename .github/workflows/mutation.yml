name: Mutation testing

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stryker:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install dotnet-stryker
        # Pin to a known version so runs are reproducible across weeks and
        # so a Stryker.NET point release cannot quietly break the gate.
        run: dotnet tool install -g dotnet-stryker --version 4.14.2

      - name: Restore + build (Release)
        run: |
          dotnet restore PostQuantum.Hybrid.slnx
          dotnet build PostQuantum.Hybrid.slnx --configuration Release --no-restore

      - name: Run Stryker
        # Runs from the repo root where stryker-config.json lives — when
        # invoked from a subdirectory the config is not discovered and
        # Stryker's fallback auto-discovery cannot link the test project's
        # ProjectReference to the multi-TFM source project, surfacing as
        # "can't be mutated because no test project references it" +
        # "Failed to analyze project builds". stryker-config.json sets
        # thresholds.break = 70 — Stryker exits non-zero (failing the
        # workflow) when the mutation score drops below that.
        run: dotnet stryker --reporter "json" --reporter "html" --reporter "progress"

      - name: Upload Stryker report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stryker-report
          path: StrykerOutput/
          retention-days: 30
          if-no-files-found: warn
