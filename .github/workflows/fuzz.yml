name: Fuzzing

# Weekly coverage-guided fuzzing of every wire-format parser entry point.
# Drives the SharpFuzz harness (fuzz/PostQuantum.Hybrid.Fuzz.Sharp) under
# AFL++, one matrix job per target, time-boxed per run. Any crash (an
# exception type the parsers are not allowed to throw) fails the job and
# uploads the crashing inputs as artifacts.
#
# Note: ubuntu-latest's OpenSSL does not expose ML-KEM/ML-DSA, so the
# net10.0 harness exercises the BouncyCastle backend here — which is the
# right target anyway: the parsers under fuzz are backend-independent,
# and BouncyCastle is the path that handles attacker-controlled bytes on
# .NET 8.

on:
  schedule:
    - cron: "0 6 * * 2"   # Tuesdays 06:00 UTC (Stryker runs Mondays)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  afl:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        target:
          - kem-public-key
          - kem-private-key
          - kem-ciphertext
          - sig-public-key
          - sig-private-key
          - sig-verify
          - pem-kem-public-key

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install AFL++ and SharpFuzz CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y afl++
          dotnet tool install -g SharpFuzz.CommandLine

      - name: Build harness (Release, net10.0)
        run: dotnet build fuzz/PostQuantum.Hybrid.Fuzz.Sharp -c Release -f net10.0

      - name: Generate seed corpus
        run: |
          dotnet fuzz/PostQuantum.Hybrid.Fuzz.Sharp/bin/Release/net10.0/PostQuantum.Hybrid.Fuzz.Sharp.dll \
            make-corpus corpus

      # Persistent corpus across weekly runs: each run's AFL queue (the
      # inputs that exercised new coverage) is folded back into the seed
      # set for the next run, so coverage accumulates over time instead
      # of restarting from the minimal-valid seeds every Tuesday. Cache
      # is keyed per target; misses fall through to seed-only corpus.
      - name: Restore accumulated corpus for ${{ matrix.target }}
        uses: actions/cache@v4
        with:
          path: persistent-corpus/${{ matrix.target }}
          key: afl-corpus-v1-${{ matrix.target }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            afl-corpus-v1-${{ matrix.target }}-

      - name: Merge seed + persistent corpus
        run: |
          mkdir -p "input/${{ matrix.target }}" "persistent-corpus/${{ matrix.target }}"
          cp -r "corpus/${{ matrix.target }}/." "input/${{ matrix.target }}/" 2>/dev/null || true
          # Persistent entries are AFL-queue filenames (id:000000,time:...);
          # they may collide with seed names, prefix to keep both sets.
          for f in "persistent-corpus/${{ matrix.target }}"/*; do
            [ -e "$f" ] || continue
            cp "$f" "input/${{ matrix.target }}/persistent-$(basename "$f" | tr ':,' '__')"
          done
          echo "input corpus size: $(ls input/${{ matrix.target }} | wc -l)"

      - name: Instrument PostQuantum.Hybrid.dll
        run: sharpfuzz fuzz/PostQuantum.Hybrid.Fuzz.Sharp/bin/Release/net10.0/PostQuantum.Hybrid.dll

      - name: Fuzz ${{ matrix.target }} (25 min)
        env:
          # afl-fuzz refuses to start when the target binary (dotnet) is not
          # AFL-instrumented; SharpFuzz instruments the managed DLL instead.
          AFL_SKIP_BIN_CHECK: "1"
          AFL_SKIP_CPUFREQ: "1"
          AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES: "1"
          # .NET startup is slow by AFL standards; give the fork server time.
          AFL_FORKSRV_INIT_TMOUT: "60000"
        run: |
          afl-fuzz -i "input/${{ matrix.target }}" -o findings \
            -t 10000 -m 10240 -V 1500 \
            -- dotnet fuzz/PostQuantum.Hybrid.Fuzz.Sharp/bin/Release/net10.0/PostQuantum.Hybrid.Fuzz.Sharp.dll \
            "${{ matrix.target }}"

      # Roll the discovered queue back into the persistent corpus for
      # next week. afl-cmin trims to a minimal subset that retains the
      # same edge coverage, keeping cache size bounded.
      - name: Minimize and persist new queue entries
        if: success()
        run: |
          if [ ! -d findings/default/queue ]; then
            echo "no AFL queue produced — nothing to persist"
            exit 0
          fi
          rm -rf "persistent-corpus/${{ matrix.target }}"
          mkdir -p "persistent-corpus/${{ matrix.target }}"
          afl-cmin -i findings/default/queue -o "persistent-corpus/${{ matrix.target }}" \
            -t 10000 -m 10240 \
            -- dotnet fuzz/PostQuantum.Hybrid.Fuzz.Sharp/bin/Release/net10.0/PostQuantum.Hybrid.Fuzz.Sharp.dll \
            "${{ matrix.target }}" \
            || cp -r findings/default/queue/. "persistent-corpus/${{ matrix.target }}/"
          echo "persisted corpus size: $(ls persistent-corpus/${{ matrix.target }} | wc -l)"

      - name: Check for crashes
        run: |
          crashes=$(find findings -path '*/crashes/*' -type f ! -name 'README.txt' | wc -l)
          hangs=$(find findings -path '*/hangs/*' -type f | wc -l)
          echo "crashes=$crashes hangs=$hangs"
          if [ "$crashes" -ne 0 ]; then
            echo "::error::afl-fuzz found $crashes crashing input(s) for target ${{ matrix.target }}"
            exit 1
          fi

      # AFL++ names queue entries like "id:000000,time:0,..."; upload-artifact
      # rejects colons in paths, so pack the findings into a tarball first.
      - name: Pack findings
        if: always()
        run: |
          if [ -d findings ]; then
            tar czf "fuzz-findings-${{ matrix.target }}.tar.gz" findings
          fi

      - name: Upload findings
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-findings-${{ matrix.target }}
          path: fuzz-findings-${{ matrix.target }}.tar.gz
          retention-days: 30
          if-no-files-found: ignore
