name: Release

# Triggered by pushing a v*.*.* tag. Builds, tests, packs the six packages,
# attaches them to a GitHub release, and pushes them to nuget.org using
# Trusted Publishing (OIDC) — no long-lived NUGET_API_KEY secret.
#
# Setup (one-time per maintainer): docs/TRUSTED-PUBLISHING.md.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest

    # The "nuget" environment is where we hang environment-protection rules
    # (required reviewers, allowed branches/tags) if we ever want to gate
    # publishes manually. The Trusted Publishing policy on nuget.org also
    # pins to this exact environment name, so renaming it requires updating
    # the policy too.
    environment: nuget

    permissions:
      contents: write       # required by softprops/action-gh-release to attach the .nupkg files
      id-token: write       # required by NuGet/login (OIDC key exchange) and by attest-build-provenance (Sigstore signing)
      attestations: write   # required by attest-build-provenance to store the provenance attestation

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore + build
        run: |
          dotnet restore PostQuantum.Hybrid.slnx
          dotnet build PostQuantum.Hybrid.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test PostQuantum.Hybrid.slnx --configuration Release --no-build

      - name: Pack all six packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for proj in \
            src/PostQuantum.Hybrid/PostQuantum.Hybrid.csproj \
            src/PostQuantum.Hybrid.Envelopes/PostQuantum.Hybrid.Envelopes.csproj \
            src/PostQuantum.Hybrid.AspNetCore/PostQuantum.Hybrid.AspNetCore.csproj \
            src/PostQuantum.Hybrid.Analyzers/PostQuantum.Hybrid.Analyzers.csproj \
            src/PostQuantum.Hybrid.TestingSupport/PostQuantum.Hybrid.TestingSupport.csproj \
            templates/PostQuantum.Hybrid.Templates.csproj
          do
            dotnet pack "$proj" \
              --configuration Release \
              -p:Version=$VERSION \
              -p:ContinuousIntegrationBuild=true \
              -o ./artifacts
          done

      # Sigstore build provenance: lets anyone verify a .nupkg was built by
      # THIS repo's release workflow from THIS tag —
      #   gh attestation verify <file>.nupkg --owner systemslibrarian
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: artifacts/*.nupkg

      - name: Upload artifacts to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*.nupkg
          generate_release_notes: true

      # ---------------------------------------------------------------
      # Trusted Publishing: exchange the GitHub OIDC token for a
      # 1-hour nuget.org API key. The trust policy on nuget.org pins
      # this exchange to owner + repo + workflow filename + environment,
      # so a fork can never authenticate.
      #
      # Setup runbook: docs/TRUSTED-PUBLISHING.md.
      # ---------------------------------------------------------------
      - name: NuGet login (OIDC -> short-lived API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          # Your nuget.org PROFILE NAME (not your email). Stored as a
          # repo secret so the workflow source can be public without
          # outing the account name to scrapers.
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
