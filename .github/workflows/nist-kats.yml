name: NIST KATs

on:
  workflow_dispatch:
  schedule:
    - cron: "23 8 * * 0"   # Sundays 08:23 UTC

permissions:
  contents: read

jobs:
  kats:
    name: NIST FIPS-203/204 KATs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore + build (Release)
        run: |
          dotnet restore PostQuantum.Hybrid.slnx
          dotnet build PostQuantum.Hybrid.slnx --configuration Release --no-restore

      - name: Run the in-repo KAT regression + vendored ACVP vectors
        run: |
          dotnet test tests/PostQuantum.Hybrid.Tests \
            --configuration Release --no-build \
            --filter "FullyQualifiedName~DeterministicKeyGenerationTests|FullyQualifiedName~NistKatTests|FullyQualifiedName~NistAcvpKatTests" \
            --logger "console;verbosity=detailed"

      # Optional: fetch the published NIST FIPS-203/204 .rsp files when
      # vars.NIST_KAT_MIRROR is set on the repo, then run NistKatRunner
      # against them. The runner skips cleanly when the env var is unset
      # (so this whole section is a no-op for forks that haven't
      # configured a mirror).
      - name: Fetch NIST FIPS-203/204 KATs (optional)
        if: ${{ vars.NIST_KAT_MIRROR != '' }}
        env:
          NIST_KAT_MIRROR: ${{ vars.NIST_KAT_MIRROR }}
        run: |
          mkdir -p /tmp/nist-kats
          curl -fL "$NIST_KAT_MIRROR/ML-KEM-768.zip" -o /tmp/nist-kats/mlkem768.zip
          curl -fL "$NIST_KAT_MIRROR/ML-DSA-65.zip"  -o /tmp/nist-kats/mldsa65.zip
          (cd /tmp/nist-kats && unzip -q mlkem768.zip && unzip -q mldsa65.zip)

      - name: Run NistKatRunner against the downloaded vectors
        if: ${{ vars.NIST_KAT_MIRROR != '' }}
        env:
          PQH_NIST_KAT_DIR: /tmp/nist-kats
        run: |
          dotnet test tests/PostQuantum.Hybrid.Tests \
            --configuration Release --no-build \
            --filter "FullyQualifiedName~NistKatRunner" \
            --logger "console;verbosity=detailed"

      - name: Upload KATs (if downloaded)
        if: ${{ vars.NIST_KAT_MIRROR != '' && always() }}
        uses: actions/upload-artifact@v7
        with:
          name: nist-kats
          path: /tmp/nist-kats/
          retention-days: 7
